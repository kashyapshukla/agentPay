services:
  - type: web
    name: agentpay-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn core.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: worker
    name: agentpay-aggregator
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m core.workers.aggregator"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
