version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "core.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    ports:
      - "8000:8000"

  aggregator:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "core.workers.aggregator"]
    env_file: .env
