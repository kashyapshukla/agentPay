version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: agentpay
      POSTGRES_PASSWORD: agentpay_password
      POSTGRES_DB: agentpay_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentpay -d agentpay_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://agentpay:agentpay_password@db:5432/agentpay_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=supersecretjwtkey_change_me_in_prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  aggregator:
    build: .
    environment:
      - DATABASE_URL=postgresql+asyncpg://agentpay:agentpay_password@db:5432/agentpay_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "core.workers.aggregator"]
    volumes:
      - .:/app

volumes:
  postgres_data:
  redis_data:
